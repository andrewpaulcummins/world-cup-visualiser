name: Update Scores

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Fetch scores from API
        env:
          FOOTBALL_KEY: ${{ secrets.VITE_FOOTBALL_KEY }}
        run: |
          curl -sf \
            -H "X-Auth-Token: $FOOTBALL_KEY" \
            "https://api.football-data.org/v4/competitions/WC/matches" \
            -o scores.json \
          || echo '{"matches":[]}' > scores.json

      - name: Commit and push if changed
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add scores.json
          git diff --staged --quiet || git commit -m "chore: update scores"
          git push
